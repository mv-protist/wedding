<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Veronika a Marek | Svadba</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #f7f1e8;
      color: #2f2a25;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
    }

    main {
      max-width: 760px;
      padding: 48px 24px;
    }

    .label {
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 13px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(48px, 9vw, 88px);
      font-weight: normal;
      margin: 0 0 20px;
      line-height: 1;
    }

    p {
      font-size: 22px;
      line-height: 1.5;
      margin: 0;
    }
  </style>
</head>
<body>
  <main>
    <div class="label">Svadobná stránka</div>
    <h1>Veronika a Marek</h1>
    <p>Čoskoro tu nájdete všetky dôležité informácie.</p>
  </main>
</body>
</html>
